      - "Correlation: higher correlation → lower FTD spread → defaults tend to cluster (all or nothing)"
      - "Widest-spread name dominates — Name 5 (250 bps) contributes most to FTD probability"
      - "Adding a sixth name increases FTD probability (more chances for first default)"
    model_risk: "High — copula model choice (Gaussian vs t) materially affects tail default probabilities. Correlation is not directly observable — calibrated from CDX/iTraxx tranches or historical data."

