meta:
  product_id: SRT
  product_name: "Structured Rate Trades (family)"
  family: SRT
  category: style-patterns
  stored_at: "2026-06-18T12:55Z"
  source_stage: style
  version: 1

content:
  heading_format: "Sentence case for H4 subsections"
  currency_notation: "USD with international notation: 10M, 250k, 1.5bn"

  canonical_h4_names:
    - "Definition"
    - "Construction"
    - "Booking & systems"
    - "Pricing intuition"
    - "Worked example (USD 10M)"
    - "Reconciliation specifics"
    - "Desk view"
    - "Desk shorthand"

  known_false_positives:
    - rule: "H4 heading names flagged as non-canonical"
      reason: "The canonical names ARE sentence case per author/writer specs."
      applies_to: "All products"
    - rule: "Murex mentioned for SRT products"
      reason: "Murex IS correct for SRT. The style rule 'Murex mentioned for ELN/CLN/Deposit' does NOT apply to SRT."
      applies_to: "All SRT products"

  approved_patterns:
    - pattern: "USD prefix on all monetary figures"
      note: "Bare '10M' without 'USD' prefix is a genuine style violation."
    - pattern: "Desk shorthand in italic, 8 words or fewer"
      note: "Count words literally."
    - pattern: "Murex four-leg framework in Booking & systems"
      note: "SRT products must reference all four Murex legs."

  accepted_conventions:
    - convention: "Termsheet as legal document"
      reason: "For SRT note-format products, the legal document is the Termsheet. This is correct."
      applies_to: "All SRT products"

    - convention: "Normal volatility in basis points"
      reason: "'65 bps normal' is standard shorthand for Bachelier normal volatility. The full form 'normal (Bachelier) basis points' may be used on first reference but is not required on subsequent references."
      applies_to: "All SRT products with swaption components"

    - convention: "Approximate reinvestment loss"
      reason: "Simple-interest reinvestment loss calculations ('approximately USD X') are acceptable in desk bible worked examples. PV adjustment would obscure the pedagogical point."
      applies_to: "Callable products with reinvestment scenarios"
