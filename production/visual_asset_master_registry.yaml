# Visual Asset Master Registry — Desk Bible v2
# Version: 1.0
# Date: 2026-06-20
# Authority: Framework Master v1.3.1
# Purpose: Single source of truth for all publication visual assets across 49 chapters.
#
# GOVERNANCE RULES:
#   1. Every visual specification in a chapter must have a corresponding entry here.
#   2. Entries are added during chapter generation, after the chapter is accepted.
#   3. Visual IDs and Figure Numbers must be globally unique. No duplicates permitted.
#   4. Future Asset Filenames must be globally unique. No duplicates permitted.
#   5. Before adding a new entry, check for Visual ID and filename conflicts.
#   6. Publication Status tracks the asset through the publication pipeline:
#      SPEC → SVG → PNG → DOCX → PDF → PUBLISHED
#   7. All assets begin at SPEC status during chapter generation.
#   8. Asset generation (SVG+) is deferred until all 49 chapters are complete.
#   9. This registry is updated at each batch review and during the publication pass.
#  10. If a chapter is revised during harmonization, its visual entries must be updated here.
#
# FIELDS:
#   figure_number: "Figure 5.X.Y-##" — globally unique
#   visual_id: "TYPE_PRODUCT_##" — globally unique
#   product: Product name
#   section: "5.X.Y"
#   family: ELN / Swaps / SRT / STEG / CLN / Other
#   priority: P1 / P2 / P3
#   asset_filename: "type_product_##.svg" — globally unique
#   asset_type: Payoff Diagram / Timeline / Decision Tree / Lifecycle Diagram /
#               Cash Flow Diagram / Waterfall Diagram / Comparison Chart /
#               System Flow Diagram / Balance Sheet Illustration
#   reuse_status: High / Medium / Low
#   publication_status: SPEC / SVG / PNG / DOCX / PDF / PUBLISHED
#   svg_status: PENDING / GENERATED / VALIDATED / FAILED
#   png_status: PENDING / GENERATED / VALIDATED / FAILED
#   docx_status: PENDING / INSERTED / VALIDATED / FAILED
#   pdf_status: PENDING / INSERTED / VALIDATED / FAILED
#   caption: Publication-ready caption text
#   purpose: One-sentence purpose

# NOTE: Batches 5-7 have full Publication Asset specifications (v1.2/v1.3.1).
# Batches 0-4 have Visual Learning Recommendations (less detailed).
# During the Template Harmonization Pass, Batches 0-4 will be upgraded to full specs.
# Until then, only Batch 5+ entries are populated below.
# Batches 0-4 entries will be populated during harmonization.

