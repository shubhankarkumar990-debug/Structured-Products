# Publication Taxonomy — Desk Bible v2
# Version: 1.0
# Date: 2026-06-22
# Purpose: Canonical categorical values for Comparison Matrix fields.
#           Maps all manuscript variants into standardized categories.
#
# GOVERNANCE:
#   1. This file defines the allowed values for 6 CM dimensions.
#   2. Each dimension has 3-6 canonical categories.
#   3. Each category lists the manuscript variants that map to it.
#   4. DNA Atlas and Comparison Matrix generators must use canonical values.
#   5. Frozen after Publication Metadata Freeze.

dimensions:

  # ================================================================
  # CREDIT EXPOSURE
  # ================================================================
  credit_exposure:
    categories:
      - canonical: "Issuer"
        description: "Investor bears issuer/bank credit risk. Note format."
        variants:
          - "Issuer"
          - "Issuer (note format)"
          - "Issuer (bank)"
          - "Issuer (deposit, not OTC)"
          - "Issuer (mitigated by deposit insurance)"
        sections: ["5.1.1","5.1.2","5.1.3","5.1.4","5.1.5","5.1.6","5.1.7","5.1.8","5.1.9","5.1.10","5.1.11","5.1.12","5.1.13","5.1.14","5.3.2","5.3.3","5.3.5","5.4.1","5.4.2","5.4.3","5.4.4","5.6.1","5.6.4","5.6.5","5.6.8","5.6.9","5.6.11"]

      - canonical: "Counterparty"
        description: "Bilateral OTC — investor bears counterparty credit risk."
        variants:
          - "Counterparty"
          - "Counterparty (bilateral)"
          - "Counterparty (bilateral OTC)"
          - "Counterparty (bilateral, mitigated by CSA)"
          - "Counterparty (bilateral swap)"
        sections: ["5.2.1","5.2.2","5.2.3","5.2.4","5.2.6","5.2.7","5.2.8","5.3.1","5.6.2","5.6.6","5.6.7"]

      - canonical: "Counterparty + Reference"
        description: "Counterparty risk plus credit exposure to reference entity."
        variants:
          - "Counterparty + reference entity"
        sections: ["5.2.5"]

      - canonical: "Reference Entity + Issuer"
        description: "Credit-linked — exposed to reference entity default AND issuer."
        variants:
          - "Reference entity + Issuer (dual credit)"
          - "Reference entity + issuer"
          - "Basket reference entities + issuer"
        sections: ["5.5.1","5.5.2","5.5.3","5.5.4"]

      - canonical: "Portfolio"
        description: "Exposure to portfolio of reference entities. Tranched loss allocation."
