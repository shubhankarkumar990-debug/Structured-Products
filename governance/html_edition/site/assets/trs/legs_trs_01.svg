<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" font-family="DejaVu Sans, Arial, sans-serif">
<rect x="0" y="0" width="820" height="300" fill="white"/>
<text x="24" y="36" font-size="16" font-weight="bold" fill="#1f3a5f">TRS Cashflow Legs — Investor Lens</text>
<rect x="70" y="110" width="200" height="80" rx="10" fill="#1f3a5f"/>
<text x="170" y="156" font-size="15" fill="white" text-anchor="middle" font-weight="bold">Client</text>
<rect x="550" y="110" width="200" height="80" rx="10" fill="#41607f"/>
<text x="650" y="156" font-size="15" fill="white" text-anchor="middle" font-weight="bold">Desk / Bank</text>
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#c8553d"/></marker><marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2e7d5b"/></marker></defs>
<line x1="270" y1="135" x2="548" y2="135" stroke="#c8553d" stroke-width="2.4" marker-end="url(#ar)"/>
<text x="409" y="126" font-size="12" fill="#c8553d" text-anchor="middle">Client pays: SOFR + spread (funding leg)</text>
<line x1="548" y1="168" x2="272" y2="168" stroke="#2e7d5b" stroke-width="2.4" marker-end="url(#ag)"/>
<text x="409" y="186" font-size="12" fill="#2e7d5b" text-anchor="middle">Client receives: Total return of reference asset (price change + income)</text>
<text x="410" y="250" font-size="11" fill="#8a99a8" text-anchor="middle">Bilateral OTC swap — two legs exchanged on each reset; only the NET is paid.</text>
</svg>