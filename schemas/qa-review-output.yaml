# Output schema for sp-qa-agent
# Write to: outputs/reviews/{product_id}_qa.yaml

qa_review:
  product_id: ""
  reviewed_at: ""
  scope:
    first_run: true|false
    sections_reviewed: []
    sections_skipped: []

  summary:
    total: 0
    blocker: 0
    major: 0
    minor: 0

  issues:
    - id: "QA-001"
      severity: BLOCKER | MAJOR | MINOR
      location: ""
      issue: ""
      evidence: ""
      required_action: ""

  gate: PASS | FAIL
  blocker_ids: []
