# Memory file schemas for sp-memory-agent
# All memory files use this envelope + a category-specific content block.

# --- Envelope (every memory file) ---

meta:
  product_id: ""           # e.g., PHX001
  product_name: ""         # e.g., Phoenix Autocallable
  family: ""               # ELN | CLN | SRT | STEG | Swap | Deposit
  category: ""             # definitions | components | terminology | examples | booking-maps | reconciliation | style-patterns
  stored_at: ""            # ISO 8601
  source_stage: ""         # research | architecture | writing | booking | qa | style
  version: 1               # Increment on update

content:
  # Category-specific content below

