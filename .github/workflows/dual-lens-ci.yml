name: Dual-lens quality gate

on:
  push:
    paths:
      - "Desk_Bible_v2.md"
      - "production/**"
      - "governance/linter/**"
  pull_request:
    paths:
      - "Desk_Bible_v2.md"
      - "production/**"
      - "governance/linter/**"
  workflow_dispatch:

jobs:
  dual-lens-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Semantic linter (fail on S1) + regression suite
        run: bash governance/linter/run_checks.sh
