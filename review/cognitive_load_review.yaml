reinforcement_pattern_analysis:
  strong_patterns:
    - "Mental Model blockquotes at section ends (consistent across all Parts)"
    - "Knowledge Checks with review + scenario + desk questions (present after each Part)"
    - "'Why This Matters for Structured Products' closings (Part 0 — excellent)"
    - "Professor Notes (Part 2 — effective)"
    - "Common Mistakes sections (Part 2, selective Part 3 — high value)"
    - "Desk Perspective tables (Part 2 — good for role-based reinforcement)"

  weak_patterns:
    - "'Why This Matters' closings disappear after Part 0"
    - "Common Mistakes sections are inconsistent — present in some Part 2/3 sections but not others"
    - "Desk Perspective tables appear only in Part 2"
    - "No reinforcement exercises mid-section (only at end-of-Part)"
    - "Parts 3-4 have no reinforcement devices except the combined Knowledge Check"

recommendations:
  - priority: critical
    action: "Split Section 1.7 into two sections. This is the single highest-impact change for cognitive load."
  - priority: high
    action: "Add worked numerical examples to Sections 1.4 and 1.7 (or 1.7a/1.7b after split)."
  - priority: high
    action: "Add narrative introductions and at least one worked scenario to Part 4 matrices."
  - priority: medium
    action: "Standardize Common Mistakes and Desk Perspective sections across all Parts 1-4."
  - priority: medium
    action: "Add one-sentence product descriptions to Part 3 family trees."
  - priority: low
    action: "Consider mini Knowledge Checks mid-Part-1 (after Section 1.3 and after Section 1.6) to provide reinforcement breaks."
